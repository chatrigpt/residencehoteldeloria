<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Résidence Hôtel Deloria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A227;
            --gold-light: #E8D5A3;
            --gold-dark: #A88420;
            --brown: #5D3A1A;
            --brown-dark: #3D2410;
            --brown-light: #8B5E3C;
            --cream: #FFF8E7;
            --cream-dark: #F5E6C8;
            --white: #FFFFFF;
            --shadow: 0 4px 24px rgba(93, 58, 26, 0.12);
            --shadow-hover: 0 8px 32px rgba(93, 58, 26, 0.20);
            --shadow-gold: 0 6px 24px rgba(201, 162, 39, 0.35);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(160deg, var(--cream) 0%, var(--cream-dark) 50%, #EDE0C8 100%);
            min-height: 100vh;
            color: var(--brown);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            overflow-x: hidden;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A227' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        .page-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease forwards;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 6px 20px rgba(93, 58, 26, 0.25));
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            box-shadow: var(--shadow);
        }

        /* Hotel name */
        .hotel-name {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--brown);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            animation: fadeInDown 0.8s ease 0.1s forwards;
            opacity: 0;
        }

        .tagline {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            font-weight: 400;
            font-style: italic;
            color: var(--brown-light);
            opacity: 0.8;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            animation: fadeInDown 0.8s ease 0.2s forwards;
            opacity: 0;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 2.5rem;
            animation: fadeInDown 0.8s ease 0.25s forwards;
            opacity: 0;
        }

        /* Buttons container */
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeInUp 0.8s ease 0.3s forwards;
            opacity: 0;
        }

        .btn {
            width: 100%;
            padding: 1.1rem 1.5rem;
            border: none;
            border-radius: 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            letter-spacing: 0.5px;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* Primary button - Order */
        .btn-order {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--brown-dark);
            box-shadow: var(--shadow-gold);
            font-size: 1rem;
            padding: 1.2rem 1.5rem;
        }

        .btn-order:hover {
            box-shadow: 0 8px 30px rgba(201, 162, 39, 0.5);
        }

        .btn-order svg {
            stroke: var(--brown-dark);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Review button */
        .btn-review {
            background: linear-gradient(135deg, #4285F4 0%, #34A853 50%, #FBBC05 75%, #EA4335 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(66, 133, 244, 0.3);
        }

        .btn-review:hover {
            box-shadow: 0 6px 24px rgba(66, 133, 244, 0.45);
        }

        .btn-review svg {
            fill: white;
        }

        /* Facebook button */
        .btn-facebook {
            background: linear-gradient(135deg, #1877F2 0%, #166fe5 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(24, 119, 242, 0.3);
        }

        .btn-facebook:hover {
            box-shadow: 0 6px 24px rgba(24, 119, 242, 0.45);
        }

        .btn-facebook svg {
            fill: white;
        }

        /* TikTok button */
        .btn-tiktok {
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #333333 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .btn-tiktok:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
        }

        .btn-tiktok svg {
            fill: white;
        }

        /* Footer info */
        .footer-info {
            margin-top: 2.5rem;
            animation: fadeInUp 0.8s ease 0.5s forwards;
            opacity: 0;
        }

        .footer-info p {
            font-size: 0.75rem;
            color: #AAA;
            line-height: 1.8;
        }

        .footer-info a {
            color: var(--gold-dark);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-divider {
            width: 30px;
            height: 2px;
            background: var(--gold);
            margin: 1rem auto;
            opacity: 0.4;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 380px) {
            .hotel-name { font-size: 1.25rem; letter-spacing: 2px; }
            .btn { padding: 1rem 1.2rem; font-size: 0.85rem; }
            .logo-img { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>
